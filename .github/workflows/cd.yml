name: Build Dev Backend Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "Dockerfile.Build"

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Dockerfile.Build -t sight-dev-backend:latest .

      - name: Save Docker image
        run: docker save sight-dev-backend:latest | gzip > sight-dev-backend.tar.gz

      - name: Copy image and compose file to dev server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: sight-dev-backend.tar.gz,docker-compose.dev.yaml
          target: /home/nananina/
          overwrite: true

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker load < /home/nananina/sight-dev-backend.tar.gz
            cd /home/nananina && docker compose -f docker-compose.dev.yaml up -d
