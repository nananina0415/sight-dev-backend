name: Build Dev Backend Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "Dockerfile.Build"
      - ".devAuth/**"
      - "docker-compose.dev.yaml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.Build -t sight-dev-backend:latest .
          docker build -f .devAuth/Dockerfile -t dev-auth:latest .devAuth

      - name: Save Docker images
        run: |
          docker save sight-dev-backend:latest dev-auth:latest | gzip > images.tar.gz

      - name: Copy images and compose file to dev server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: images.tar.gz,docker-compose.dev.yaml
          target: /home/nananina/
          overwrite: true

      - name: Deploy to dev server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: INTERNAL_API_KEY
          script: |
            docker load < /home/nananina/images.tar.gz
            cd /home/nananina && INTERNAL_API_KEY=$INTERNAL_API_KEY docker compose -f docker-compose.dev.yaml up -d
        env:
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
