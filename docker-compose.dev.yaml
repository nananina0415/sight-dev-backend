services:
  backend:
    image: sight-dev-backend:latest
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_TOOL_OPTIONS=-Duser.timezone=UTC
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DISCORD_ENABLED=false
    env_file:
      - "/home/nananina/.env"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0.43
    environment:
      - TZ=Asia/Seoul
    env_file:
      - "/home/nananina/.env"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql-data:
