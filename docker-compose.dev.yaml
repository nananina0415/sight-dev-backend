services:
  backend:
    image: sight-dev-backend:latest
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_TOOL_OPTIONS=-Duser.timezone=UTC
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - DISCORD_ENABLED=false
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - AUTH_SERVICE_ENDPOINT=http://dev-auth:8080
    env_file:
      - "/home/nananina/.env"
    depends_on:
      - mysql
      - dev-auth
    restart: unless-stopped

  mysql:
    image: mysql:8.0.43
    environment:
      - TZ=Asia/Seoul
    env_file:
      - "/home/nananina/.env"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  dev-auth:
    image: dev-auth:latest
    environment:
      - AUTH_SERVICE_API_KEY=${AUTH_SERVICE_API_KEY}
    restart: unless-stopped

volumes:
  mysql-data:
